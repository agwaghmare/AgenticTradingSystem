services:
  db:
    image: postgres:16
    container_name: agentictradingsystem-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: agentictradingsystem
    ports:
      - "5432:5432"
    volumes:
      - agentictradingsystem_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentictradingsystem"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent:
    build: .
    container_name: agentictradingsystem-agent
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:localpassword@db:5432/agentictradingsystem
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agentictradingsystem_pgdata:
